<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chrome Shield Pro</title>
  <link rel="stylesheet" href="ui.css">
</head>
<body class="popup-body">
  <main class="popup-wrap">
    <section class="hero card dark">
      <div class="hero-top">
        <div>
          <div class="eyebrow">CHROME EXTENSION BY CODEIGNITE</div>
          <h1>Chrome Shield Pro</h1>
        </div>
        <label class="toggle"><input id="enabledToggle" type="checkbox"><span></span></label>
      </div>
      <div class="status-line">Protection <strong id="statusText">Enabled</strong></div>
      <div class="stats-grid">
        <div class="stat-box"><div class="label">Total blocked</div><div id="totalBlocked" class="value">0</div></div>
        <div class="stat-box"><div class="label">Popups blocked</div><div id="popupBlocked" class="value">0</div></div>
      </div>
    </section>

    <section class="card dark current-site-card">
      <div class="row between stretch-on-mobile current-site-head">
        <div class="stack gap-xs min0">
          <div class="label">Current website</div>
          <strong id="siteHost" class="site-host">-</strong>
        </div>
        <label class="toggle compact"><input id="siteHostToggle" type="checkbox"><span></span></label>
      </div>

      <div class="switch-list">
        <div class="switch-item">
          <span>Allowlist site</span>
          <label class="toggle compact"><input id="allowlistToggle" type="checkbox"><span></span></label>
        </div>
        <div class="switch-item">
          <span>Block popup on site</span>
          <label class="toggle compact"><input id="popupSiteToggle" type="checkbox"><span></span></label>
        </div>
      </div>

      <div class="actions-grid three">
        <button id="pickElement" class="pill primary">Pick element</button>
        <button id="openInspector" class="pill ghost">Request inspector</button>
        <button id="openOptions" class="pill ghost">Settings</button>
      </div>
      <div class="subtle subtle-light" id="updatedAt">Last rules update: -</div>
    </section>

    <section class="card light">
      <div class="section-title">Top blocking rules on this tab</div>
      <div id="rulesList" class="list compact"></div>
    </section>

    <section class="card light">
      <div class="section-title">Blocked ad domains on this tab</div>
      <div id="domainList" class="list compact"></div>
    </section>

    <section class="card light">
      <div class="section-title">Recent blocked items</div>
      <div id="recentItems" class="list compact"></div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
